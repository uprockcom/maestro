services:
  signal-cli:
    image: bbernhard/signal-cli-rest-api:latest
    restart: unless-stopped
    volumes:
      - signal-data:/home/.local/share/signal-cli
    environment:
      - MODE=json
      - RECEIVE_WEBHOOK_URL=http://relay:8080/internal/webhook

  relay:
    image: ghcr.io/uprockcom/maestro-signal-relay:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SIGNAL_API=http://signal-cli:8080
      - SIGNAL_NUMBER=${SIGNAL_NUMBER}
      - TLS_DOMAIN=${TLS_DOMAIN:-}
      - TLS_EMAIL=${TLS_EMAIL:-}
      - API_KEYS_FILE=/config/keys.json
      - MESSAGE_TTL=${MESSAGE_TTL:-5m}
    volumes:
      - relay-config:/config
      - certmagic-data:/root/.local/share/certmagic
    depends_on:
      - signal-cli

volumes:
  signal-data:
  relay-config:
  certmagic-data:
